services:
  mysql:
    image: mysql:8.0.36
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: kenko_kanri
      MYSQL_USER: sanpo
      MYSQL_PASSWORD: sanpo
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: ../infra/Dockerfile.backend
    environment:
      DATABASE_URL: mysql+pymysql://sanpo:sanpo@mysql:3306/kenko_kanri
      TZ: Asia/Tokyo
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
